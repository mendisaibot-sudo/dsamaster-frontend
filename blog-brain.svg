<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Brain illustration -->
  <ellipse cx="200" cy="150" rx="90" ry="80" fill="#1f2937" stroke="#6366f1" stroke-width="3"/>
  
  <!-- Brain left hemisphere -->
  <path d="M200 80 Q140 80 120 130 Q110 180 160 210" fill="none" stroke="#6366f1" stroke-width="2"/>
  <path d="M130 150 Q150 120 170 140" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <path d="M140 180 Q160 160 180 190" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  
  <!-- Brain right hemisphere -->
  <path d="M200 80 Q260 80 280 130 Q290 180 240 210" fill="none" stroke="#6366f1" stroke-width="2"/>
  <path d="M270 150 Q250 120 230 140" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <path d="M260 180 Q240 160 220 190" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  
  <!-- Neural connections -->
  <circle cx="150" cy="120" r="4" fill="#f59e0b"/>
  <circle cx="250" cy="120" r="4" fill="#f59e0b"/>
  <circle cx="180" cy="160" r="4" fill="#10b981"/>
  <circle cx="220" cy="160" r="4" fill="#10b981"/>
  <circle cx="200" cy="190" r="4" fill="#ec4899"/>
  
  <!-- Connection lines -->
  <line x1="150" y1="120" x2="180" y2="160" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="120" x2="220" y2="160" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="160" x2="200" y2="190" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="160" x2="200" y2="190" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  
  <!-- Thought bubbles -->
  <circle cx="120" cy="80" r="3" fill="#6366f1" opacity="0.8"/>
  <circle cx="110" cy="65" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="280" cy="80" r="3" fill="#6366f1" opacity="0.8"/>
  <circle cx="295" cy="65" r="2" fill="#6366f1" opacity="0.6"/>
 
  <!--  Binary code in bubbles -->
  <text x="200" y="250" fill="#6366f1" font-family="monospace" font-size="12" opacity="0.6" text-anchor="middle">101010  AI  101010</text>
</svg>