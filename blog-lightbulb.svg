<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Lightbulb base -->
  <ellipse cx="200" cy="240" rx="25" ry="15" fill="#374151" stroke="#6366f1" stroke-width="2"/>
  <rect x="180" y="215" width="40" height="25" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Lightbulb glass -->
  <path d="M200 35 Q260 35 270 95 Q275 140 240 170 Q230 200 230 215 L170 215 Q170 200 160 170 Q125 140 130 95 Q140 35 200 35Z" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="3"/>
  
  <!-- Filament -->
  <path d="M175 140 Q195 90 205 130 Q215 90 225 130" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Inner glow -->
  <circle cx="200" cy="100" r="50" fill="#f59e0b" opacity="0.2"/>
  <circle cx="200" cy="100" r="30" fill="#fbbf24" opacity="0.3"/>
  
  <!-- Light rays -->
  <line x1="200" y1="10" x2="200" y2="-10" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="150" y1="25" x2="135" y2="15" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="250" y1="25" x2="265" y2="15" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="60" x2="100" y2="50" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="280" y1="60" x2="300" y2="50" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Sparkles -->
  <path d="M320 80 L325 85 L330 80 L325 75Z" fill="#fbbf24"/>
  <path d="M80 120 L83 123 L86 120 L83 117Z" fill="#fbbf24"/>
  <path d="M340 150 L344 154 L348 150 L344 146Z" fill="#fbbf24"/>
</svg>