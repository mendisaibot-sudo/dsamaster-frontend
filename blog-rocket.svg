<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Rocket body -->
  <path d="M200 50 Q240 80 240 160 Q240 220 200 240 Q160 220 160 160 Q160 80 200 50Z" fill="#1f2937" stroke="#6366f1" stroke-width="3"/>
  
  <!-- Window -->
  <circle cx="200" cy="130" r="25" fill="#111827" stroke="#6366f1" stroke-width="2"/>
  <circle cx="200" cy="130" r="18" fill="#6366f1" opacity="0.3"/>
  <circle cx="195" cy="125" r="5" fill="white" opacity="0.6"/>
  
  <!-- Fins -->
  <path d="M160 200 Q120 220 120 260 L165 240Z" fill="#374151" stroke="#6366f1" stroke-width="2"/>
  <path d="M240 200 Q280 220 280 260 L235 240Z" fill="#374151" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Exhaust flames -->
  <path d="M185 240 Q200 270 215 240" fill="#f59e0b" opacity="0.8"/>
  <path d="M190 242 Q200 280 210 242" fill="#ef4444" opacity="0.9"/>
  <path d="M195 244 Q200 290 205 244" fill="#fbbf24" opacity="1"/>
  
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="white" opacity="0.8"/>
  <circle cx="320" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="340" cy="120" r="2" fill="white" opacity="0.7"/>
  <circle cx="60" cy="140" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="360" cy="200" r="2" fill="white" opacity="0.6"/>
  
  <!-- Speed lines -->
  <line x1="100" y1="100" x2="140" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="180" x2="340" y2="180" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="200" x2="120" y2="200" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
</svg>