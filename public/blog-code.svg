<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Computer screen -->
  <rect x="60" y="40" width="280" height="180" rx="10" fill="#1f2937" stroke="#6366f1" stroke-width="3"/>
  <rect x="70" y="50" width="260" height="160" rx="5" fill="#111827"/>
  
  <!-- Stand -->
  <rect x="180" y="220" width="40" height="30" fill="#374151"/>
  <rect x="150" y="250" width="100" height="10" rx="5" fill="#374151"/>
  
  <!-- Code lines -->
  <rect x="80" y="65" width="40" height="6" rx="3" fill="#ec4899" opacity="0.8"/>
  <rect x="130" y="65" width="80" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
  
  <rect x="80" y="80" width="100" height="6" rx="3" fill="#10b981" opacity="0.8"/>
  <rect x="190" y="80" width="50" height="6" rx="3" fill="#f59e0b" opacity="0.8"/>
  
  <rect x="80" y="95" width="60" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
  <rect x="150" y="95" width="70" height="6" rx="3" fill="#ec4899" opacity="0.8"/>
  <rect x="230" y="95" width="40" height="6" rx="3" fill="#10b981" opacity="0.8"/>
  
  <rect x="80" y="110" width="30" height="6" rx="3" fill="#f59e0b" opacity="0.8"/>
  <rect x="120" y="110" width="90" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
  
  <rect x="80" y="125" width="80" height="6" rx="3" fill="#10b981" opacity="0.8"/>
  
  <rect x="80" y="145" width="50" height="6" rx="3" fill="#ec4899" opacity="0.8"/>
  <rect x="140" y="145" width="100" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
  
  <rect x="80" y="160" width="70" height="6" rx="3" fill="#f59e0b" opacity="0.8"/>
  <rect x="160" y="160" width="60" height="6" rx="3" fill="#10b981" opacity="0.8"/>
  
  <rect x="80" y="175" width="110" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
  
  <!-- Cursor -->
  <rect x="200" y="175" width="2" height="12" fill="#f59e0b"/>
  
  <!-- Floating symbols -->
  <text x="350" y="80" fill="#6366f1" font-family="monospace" font-size="20" opacity="0.6">{}</text>
  <text x="40" y="120" fill="#ec4899" font-family="monospace" font-size="16" opacity="0.5">[]</text>
  <text x="330" y="160" fill="#10b981" font-family="monospace" font-size="18" opacity="0.5">/</text>
</svg>