<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background stars -->
  <circle cx="50" cy="40" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="350" cy="60" r="1.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="320" cy="250" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="80" cy="260" r="1.5" fill="#10b981" opacity="0.5"/>
  
  <!-- Robot body -->
  <rect x="150" y="100" width="100" height="120" rx="20" fill="#1f2937" stroke="#6366f1" stroke-width="3"/>
  
  <!-- Robot screen/face -->
  <rect x="165" y="115" width="70" height="50" rx="10" fill="#111827"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="135" r="8" fill="#6366f1"/>
  <circle cx="215" cy="135" r="8" fill="#6366f1"/>
  
  <!-- Eye shines -->
  <circle cx="183" cy="133" r="3" fill="white" opacity="0.8"/>
  <circle cx="213" cy="133" r="3" fill="white" opacity="0.8"/>
  
  <!-- Mouth -->
  <path d="M180 155 Q200 165 220 155" stroke="#6366f1" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Antenna -->
  <line x1="200" y1="100" x2="200" y2="70" stroke="#6366f1" stroke-width="3"/>
  <circle cx="200" cy="65" r="8" fill="#f59e0b"/>
  <circle cx="200" cy="65" r="4" fill="#fbbf24"/>
  
  <!-- Robot arms -->
  <path d="M150 140 Q120 160 130 190" stroke="#6366f1" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M250 140 Q280 160 270 190" stroke="#6366f1" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Hands -->
  <circle cx="130" cy="195" r="10" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
  <circle cx="270" cy="195" r="10" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Legs -->
  <rect x="165" y="220" width="25" height="50" rx="5" fill="#374151"/>
  <rect x="210" y="220" width="25" height="50" rx="5" fill="#374151"/>
  
  <!-- Feet -->
  <ellipse cx="177" cy="275" rx="20" ry="10" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
  <ellipse cx="222" cy="275" rx="20" ry="10" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Code symbols floating -->
  <text x="80" y="120" fill="#10b981" font-family="monospace" font-size="20" opacity="0.7">&lt;/&gt;</text>
  <text x="320" y="150" fill="#f59e0b" font-family="monospace" font-size="16" opacity="0.6">{}</text>
  <text x="100" y="200" fill="#6366f1" font-family="monospace" font-size="18" opacity="0.5">AI</text>
</svg>